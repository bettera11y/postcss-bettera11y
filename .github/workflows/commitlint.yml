name: Commitlint

on:
    pull_request:
        types: [opened, synchronize, reopened, edited]

jobs:
    lint-commits:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        steps:
            - name: Lint commits
              uses: wagoid/commitlint-github-action@v6
              with:
                  configFile: commitlint.config.cjs
